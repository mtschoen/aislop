name: CI

on:
  push:
    branches: [main, schoen/main, develop, feat/csharp-support]
  pull_request:
    branches: [main, schoen/main, develop, feat/csharp-support]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to run CI against"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  check:
    name: Build & test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm vitest run

  quality-gate:
    name: Quality gate
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: aislop ci
        run: node dist/cli.js ci .

  dotnet-lint:
    name: C# lint integration
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install roslynator CLI
        run: dotnet tool install -g roslynator.dotnet.cli

      - name: Build
        run: pnpm build

      - name: Scan sample C# project and assert dotnet diagnostics appear
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          node dist/cli.js scan tests/fixtures/dotnet/sample-project --json > scan.json || true
          cat scan.json
          grep -q '"dotnet/' scan.json
